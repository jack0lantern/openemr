# Railway deployment config. Mirrors docker/production/docker-compose.yml.
# OpenEMR service uses Dockerfile.railway (extends openemr/openemr:7.0.4) for Railway PORT handling.
# Add Railway MySQL service separately; set MYSQL_HOST, MYSQL_ROOT_PASS, etc. in Variables.
"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# Matches production healthcheck: /meta/health/readyz
healthcheckPath = "/meta/health/readyz"
# OpenEMR performs first-run DB setup which takes 3-5 minutes
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
