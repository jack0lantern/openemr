# Local smoke test for Railway deployment (Dockerfile.railway)
# Run from openemr/: docker compose -f docker/railway/docker-compose.yml up --build
#
# App: http://localhost:8300/  (or https://localhost:9300/)
# Login: admin / pass

services:
  mysql:
    image: mariadb:11.8
    command: ['mariadbd', '--character-set-server=utf8mb4']
    volumes:
      - databasevolume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ['CMD', '/usr/local/bin/healthcheck.sh', '--su-mysql', '--connect', '--innodb_initialized']
      start_period: 1m
      interval: 10s
      timeout: 5s
      retries: 3

  openemr:
    build:
      context: ../..
      dockerfile: Dockerfile.railway
    ports:
      - 8300:80
      - 9300:443
    volumes:
      - logvolume:/var/log
      - sitevolume:/var/www/localhost/htdocs/openemr/sites
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: pass
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/usr/bin/curl', '--fail', '--insecure', '--location', '--silent', 'https://localhost/meta/health/readyz']
      start_period: 5m
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  databasevolume: {}
  logvolume: {}
  sitevolume: {}
