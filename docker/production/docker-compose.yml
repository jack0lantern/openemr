# Use admin/pass as user/password credentials to login to openemr (from OE_USER and OE_PASS below)
# MYSQL_HOST and MYSQL_ROOT_PASS are required for openemr
# MYSQL_USER, MYSQL_PASS, OE_USER, OE_PASS are optional for openemr and
#   if not provided, then default to openemr, openemr, admin, and pass respectively.
services:
  mysql:
    restart: always
    image: mariadb:11.8
    command: ['mariadbd','--character-set-server=utf8mb4']
    volumes:
    - databasevolume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test:
      - CMD
      - /usr/local/bin/healthcheck.sh
      - --su-mysql
      - --connect
      - --innodb_initialized
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
  openemr:
    restart: always
    image: openemr/openemr:7.0.4
    ports:
    - 80:80
    - 443:443
    volumes:
    - logvolume01:/var/log
    - sitevolume:/var/www/localhost/htdocs/openemr/sites
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: pass
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      # Use root path instead of /meta/health/readyz to avoid 403 Permission denied
      # during OpenEMR init (meta/.htaccess not readable until setup completes).
      # Root returns 200/302 when Apache is serving; readyz hits meta/ which can
      # fail with AH00529 until permissions are fixed by the image entrypoint.
      test:
      - CMD
      - /usr/bin/curl
      - --fail
      - --max-time
      - "5"
      - --silent
      - http://127.0.0.1/
      start_period: 10m
      start_interval: 10s
      interval: 1m
      timeout: 10s
      retries: 5
volumes:
  logvolume01: {}
  sitevolume: {}
  databasevolume: {}
