# Railway deployment - mirrors docker-compose.yml with MariaDB + OpenEMR
# Drag this file onto Railway project canvas to import both services.
# Matches: mariadb:11.8, utf8mb4, healthcheck, same env vars as production.
#
# After import:
# 1. OpenEMR service: set Root Directory to openemr, RAILWAY_DOCKERFILE_PATH=Dockerfile.railway
# 2. Add volumes: mysql -> /var/lib/mysql, openemr -> /var/www/.../sites, /var/log
# 3. Generate domain on OpenEMR service
services:
  mysql:
    image: mariadb:11.8
    command: ['mariadbd', '--character-set-server=utf8mb4']
    volumes:
      - databasevolume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/healthcheck.sh
        - --su-mysql
        - --connect
        - --innodb_initialized
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
  openemr:
    build:
      context: ../..
      dockerfile: Dockerfile.railway
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: pass
    depends_on:
      mysql:
        condition: service_healthy
volumes:
  databasevolume: {}
